function parseRollCount(rollStr) {
  if (!rollStr || rollStr.trim() === "") return 0;
  let total = 0;
  const parts = rollStr.split(",");
  for (const p of parts) {
    const t = p.trim();
    const m = t.match(/^(\d+)/);
    if (m) total += parseInt(m[1]);
  }
  return total;
}

function parseMaxRolls(s) {
  if (!s || s === "-" || s === "") return null;
  const m = s.match(/(\d+)/);
  return m ? parseInt(m[1]) : null;
}

function parseDateForSort(d) {
  if (!d || d === "-") return 0;
  const parts = d.split("/");
  if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
  return 0;
}

function Badge({ children, color, bg }) {
  return (
    <span style={{
      display: "inline-block", padding: "2px 10px", borderRadius: "999px",
      fontSize: "11px", fontWeight: 700, letterSpacing: "0.05em",
      color: color, background: bg, textTransform: "uppercase",
    }}>{children}</span>
  );
}

function ProgressBar({ used, max, accent }) {
  if (!max) return <span style={{ color: "#666", fontSize: 12, fontStyle: "italic" }}>no limit</span>;
  const pct = Math.min((used / max) * 100, 100);
  const isOver = used > max;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ flex: 1, height: 6, borderRadius: 3, background: "#27272a", overflow: "hidden" }}>
        <div style={{
          width: `${pct}%`, height: "100%", borderRadius: 3,
          background: isOver ? "#ef4444" : accent,
          transition: "width 0.4s ease",
        }} />
      </div>
      <span style={{ fontSize: 12, color: isOver ? "#ef4444" : "#a1a1aa", fontWeight: 600, minWidth: 45, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>
        {used}/{max}
      </span>
    </div>
  );
}

function ChemCard({ item, colors, onToggle, expanded }) {
  const used = parseRollCount(item.rolls);
  const max = parseMaxRolls(item.maxRolls);
  const isFresh = item.status === "Fresh";

  return (
    <div
      onClick={onToggle}
      style={{
        background: "#18181b",
        borderRadius: 12,
        padding: "14px 16px",
        cursor: "pointer",
        borderLeft: `3px solid ${colors.accent}`,
        transition: "all 0.2s ease",
        position: "relative",
      }}
      onMouseEnter={e => e.currentTarget.style.background = "#1f1f23"}
      onMouseLeave={e => e.currentTarget.style.background = "#18181b"}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
            <span style={{ fontWeight: 700, color: "#fafafa", fontSize: 15, fontFamily: "'JetBrains Mono', monospace" }}>{item.chem}</span>
            <Badge color={colors.text} bg={colors.badge}>{item.kit}</Badge>
            {isFresh && <Badge color="#22c55e" bg="#052e16">ACTIVE</Badge>}
            {!isFresh && <Badge color="#71717a" bg="#27272a">USED</Badge>}
          </div>
          <div style={{ display: "flex", gap: 16, color: "#71717a", fontSize: 12, marginBottom: 6 }}>
            <span>{item.notes}</span>
            <span>{item.mixDate}</span>
          </div>
          <ProgressBar used={used} max={max} accent={colors.accent} />
        </div>
      </div>

      {expanded && (
        <div style={{
          marginTop: 12, paddingTop: 12, borderTop: "1px solid #27272a",
          fontSize: 13, color: "#a1a1aa", lineHeight: 1.6,
        }}>
          {item.rolls && (
            <div style={{ marginBottom: 6 }}>
              <span style={{ color: "#71717a", fontWeight: 600, fontSize: 11, textTransform: "uppercase", letterSpacing: "0.05em" }}>Roll Log</span>
              <div style={{ color: "#d4d4d8", marginTop: 2, fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>
                {item.rolls.split(",").map((r, i) => (
                  <span key={i} style={{ display: "inline-block", background: "#27272a", borderRadius: 4, padding: "1px 6px", margin: "2px 4px 2px 0" }}>
                    {r.trim()}
                  </span>
                ))}
              </div>
            </div>
          )}
          {item.extra && (
            <div>
              <span style={{ color: "#71717a", fontWeight: 600, fontSize: 11, textTransform: "uppercase", letterSpacing: "0.05em" }}>Notes</span>
              <div style={{ color: "#fbbf24", marginTop: 2 }}>{item.extra}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function AddBatchModal({ onClose, onAdd, nextId }) {
  const [form, setForm] = useState({ kit: "C41", chem: "Developer", mixDate: "", maxRolls: "", notes: "", status: "Fresh", rolls: "", extra: "" });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const inputStyle = {
    width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid #3f3f46",
    background: "#18181b", color: "#fafafa", fontSize: 14, outline: "none", boxSizing: "border-box",
    fontFamily: "'JetBrains Mono', monospace",
  };
  const labelStyle = { display: "block", color: "#a1a1aa", fontSize: 12, fontWeight: 600, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }}
      onClick={onClose}>
      <div style={{ background: "#09090b", borderRadius: 16, padding: 24, maxWidth: 440, width: "100%", border: "1px solid #27272a", maxHeight: "90vh", overflowY: "auto" }}
        onClick={e => e.stopPropagation()}>
        <h2 style={{ color: "#fafafa", margin: "0 0 20px", fontSize: 20, fontFamily: "'Space Mono', monospace" }}>New Batch</h2>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div>
            <label style={labelStyle}>Kit</label>
            <select value={form.kit} onChange={e => set("kit", e.target.value)} style={inputStyle}>
              {["C41", "ECN-2", "E6", "B&W"].map(k => <option key={k} value={k}>{k}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStyle}>Chemistry</label>
            <select value={form.chem} onChange={e => set("chem", e.target.value)} style={inputStyle}>
              {CHEM_ORDER.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStyle}>Mix Date</label>
            <input placeholder="DD/MM/YYYY" value={form.mixDate} onChange={e => set("mixDate", e.target.value)} style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>Max Rolls</label>
            <input placeholder="e.g. 10" value={form.maxRolls} onChange={e => set("maxRolls", e.target.value)} style={inputStyle} />
          </div>
        </div>
        <div style={{ marginTop: 12 }}>
          <label style={labelStyle}>Brand / Notes</label>
          <input placeholder="e.g. Photon, Kodak, DIY..." value={form.notes} onChange={e => set("notes", e.target.value)} style={inputStyle} />
        </div>
        <div style={{ marginTop: 12 }}>
          <label style={labelStyle}>Roll Log</label>
          <textarea placeholder="e.g. 5 on 25.03.26, 3 on 27.03.26" value={form.rolls} onChange={e => set("rolls", e.target.value)}
            style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} />
        </div>
        <div style={{ marginTop: 12 }}>
          <label style={labelStyle}>Additional Notes</label>
          <input value={form.extra} onChange={e => set("extra", e.target.value)} style={inputStyle} />
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
          <button onClick={onClose}
            style={{ flex: 1, padding: "10px", borderRadius: 8, border: "1px solid #3f3f46", background: "transparent", color: "#a1a1aa", cursor: "pointer", fontSize: 14, fontWeight: 600 }}>
            Cancel
          </button>
          <button
            onClick={() => { if (form.mixDate) { onAdd({ ...form, id: nextId }); onClose(); } }}
            style={{ flex: 1, padding: "10px", borderRadius: 8, border: "none", background: "#fafafa", color: "#09090b", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>
            Add Batch
          </button>
        </div>
      </div>
    </div>
  );
}

export default function App() {
  const [data, setData] = useState(INITIAL_DATA);
  const [filterKit, setFilterKit] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [searchQ, setSearchQ] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [sortBy, setSortBy] = useState("date_desc");

  const loadStored = useCallback(() => {
  try {
    const stored = localStorage.getItem("chem-tracker-data");
    if (stored) setData(JSON.parse(stored));
  } catch {}
}, []);

  useEffect(() => { loadStored(); }, [loadStored]);

  const save = useCallback((newData) => {
  setData(newData);
  try { localStorage.setItem("chem-tracker-data", JSON.stringify(newData)); } catch {}
}, []);

  const handleAdd = (batch) => save([...data, batch]);

  const handleStatusToggle = (id) => {
    save(data.map(d => d.id === id ? { ...d, status: d.status === "Fresh" ? "Discarded" : "Fresh" } : d));
  };

  let filtered = data.filter(d => {
    if (filterKit !== "All" && d.kit !== filterKit) return false;
    if (filterStatus !== "All" && d.status !== filterStatus) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      return (d.chem + d.notes + d.kit + d.rolls + d.extra).toLowerCase().includes(q);
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (sortBy === "date_desc") return parseDateForSort(b.mixDate) - parseDateForSort(a.mixDate);
    if (sortBy === "date_asc") return parseDateForSort(a.mixDate) - parseDateForSort(b.mixDate);
    if (sortBy === "kit") return a.kit.localeCompare(b.kit);
    return 0;
  });

  const freshCount = data.filter(d => d.status === "Fresh").length;
  const discardedCount = data.filter(d => d.status === "Discarded").length;

  const kits = ["All", "C41", "ECN-2", "E6", "B&W"];

  const pillStyle = (active) => ({
    padding: "6px 14px", borderRadius: 999, border: "none", cursor: "pointer",
    fontSize: 13, fontWeight: 600,
    background: active ? "#fafafa" : "#27272a",
    color: active ? "#09090b" : "#a1a1aa",
    transition: "all 0.15s ease",
    whiteSpace: "nowrap",
  });

  return (
    <div style={{
      minHeight: "100vh", background: "#09090b", color: "#fafafa",
      fontFamily: "'Space Mono', 'JetBrains Mono', monospace",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

      <div style={{ maxWidth: 640, margin: "0 auto", padding: "24px 16px 80px" }}>
        {/* Header */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 11, color: "#52525b", fontWeight: 700, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>Eternus Film</div>
              <h1 style={{ margin: 0, fontSize: 26, fontWeight: 700, letterSpacing: "-0.02em" }}>Chemistry Tracker</h1>
            </div>
            <button onClick={() => setShowAdd(true)} style={{
              width: 44, height: 44, borderRadius: 12, border: "none",
              background: "#fafafa", color: "#09090b", fontSize: 24, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700,
            }}>+</button>
          </div>

          {/* Stats */}
          <div style={{ display: "flex", gap: 12, marginTop: 16 }}>
            <div style={{ flex: 1, background: "#052e16", borderRadius: 10, padding: "10px 14px" }}>
              <div style={{ fontSize: 22, fontWeight: 700, color: "#4ade80" }}>{freshCount}</div>
              <div style={{ fontSize: 11, color: "#86efac", textTransform: "uppercase", letterSpacing: "0.1em" }}>Active</div>
            </div>
            <div style={{ flex: 1, background: "#18181b", borderRadius: 10, padding: "10px 14px" }}>
              <div style={{ fontSize: 22, fontWeight: 700, color: "#71717a" }}>{discardedCount}</div>
              <div style={{ fontSize: 11, color: "#52525b", textTransform: "uppercase", letterSpacing: "0.1em" }}>Discarded</div>
            </div>
            <div style={{ flex: 1, background: "#18181b", borderRadius: 10, padding: "10px 14px" }}>
              <div style={{ fontSize: 22, fontWeight: 700, color: "#fafafa" }}>{data.length}</div>
              <div style={{ fontSize: 11, color: "#52525b", textTransform: "uppercase", letterSpacing: "0.1em" }}>Total</div>
            </div>
          </div>
        </div>

        {/* Search */}
        <input
          placeholder="Search chemistry, brand, notes..."
          value={searchQ}
          onChange={e => setSearchQ(e.target.value)}
          style={{
            width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #27272a",
            background: "#18181b", color: "#fafafa", fontSize: 14, outline: "none", marginBottom: 14,
            boxSizing: "border-box", fontFamily: "'JetBrains Mono', monospace",
          }}
        />

        {/* Filters */}
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 8 }}>
          {kits.map(k => (
            <button key={k} onClick={() => setFilterKit(k)} style={pillStyle(filterKit === k)}>{k}</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 6, marginBottom: 14, alignItems: "center", flexWrap: "wrap" }}>
          {["All", "Fresh", "Discarded"].map(s => (
            <button key={s} onClick={() => setFilterStatus(s)} style={pillStyle(filterStatus === s)}>
              {s === "Fresh" ? "Active" : s}
            </button>
          ))}
          <div style={{ marginLeft: "auto" }}>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
              background: "#27272a", color: "#a1a1aa", border: "none", borderRadius: 8,
              padding: "6px 10px", fontSize: 12, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
            }}>
              <option value="date_desc">Newest first</option>
              <option value="date_asc">Oldest first</option>
              <option value="kit">By kit</option>
            </select>
          </div>
        </div>

        {/* Results count */}
        <div style={{ fontSize: 12, color: "#52525b", marginBottom: 10, fontWeight: 600 }}>
          {filtered.length} batch{filtered.length !== 1 ? "es" : ""}
        </div>

        {/* Cards */}
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {filtered.map(item => {
            const colors = KIT_COLORS[item.kit] || KIT_COLORS["B&W"];
            return (
              <div key={item.id} style={{ position: "relative" }}>
                <ChemCard
                  item={item}
                  colors={colors}
                  expanded={expanded === item.id}
                  onToggle={() => setExpanded(expanded === item.id ? null : item.id)}
                />
                {expanded === item.id && (
                  <button
                    onClick={(e) => { e.stopPropagation(); handleStatusToggle(item.id); }}
                    style={{
                      position: "absolute", top: 14, right: 14, fontSize: 11, padding: "4px 10px",
                      borderRadius: 6, border: "1px solid #3f3f46", background: "transparent",
                      color: item.status === "Fresh" ? "#ef4444" : "#4ade80", cursor: "pointer",
                      fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
                    }}>
                    {item.status === "Fresh" ? "DISCARD" : "REACTIVATE"}
                  </button>
                )}
              </div>
            );
          })}
        </div>

        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: "#3f3f46" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>~</div>
            <div style={{ fontSize: 14 }}>No batches match your filters</div>
          </div>
        )}
      </div>

      {showAdd && (
        <AddBatchModal
          onClose={() => setShowAdd(false)}
          onAdd={handleAdd}
          nextId={Math.max(...data.map(d => d.id)) + 1}
        />
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>

</body>
</html>
