<title>Chemistry Tracker</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #09090b; color: #fafafa; font-family: 'Space Mono', 'JetBrains Mono', monospace; }
  #root { width: 100%; min-height: 100vh; }

  .app-header {
    padding: 14px 24px;
    border-bottom: 1px solid #18181b;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #09090b;
    position: sticky;
    top: 0;
    z-index: 50;
    flex-wrap: wrap;
    gap: 8px;
  }

  .header-buttons {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .main-container {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 20px 80px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  @media (max-width: 768px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .app-header {
      padding: 10px 16px;
    }
    .app-header h1 {
      font-size: 17px;
    }
  }

  @media (max-width: 480px) {
    .main-container {
      padding: 12px 12px 60px;
    }
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .app-header {
      padding: 10px 12px;
    }
    .app-header h1 {
      font-size: 15px;
    }
    .header-buttons {
      width: 100%;
      justify-content: flex-end;
    }
  }
</style>

</head>

  for (const p of parts) {
    const t = p.trim();
    const m = t.match(/^(\d+)/);
    if (m) total += parseInt(m[1]);
  }
  return total;
}

function parseMaxRolls(s) {
  if (!s || s === "-" || s === "") return null;
  const m = s.match(/(\d+)/);
  return m ? parseInt(m[1]) : null;
}

function parseDateForSort(d) {
  if (!d || d === "-") return 0;
  const parts = d.split("/");
  if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
  return 0;
}

function getLastUsedDate(rollStr) {
  if (!rollStr || rollStr.trim() === "") return null;
  const datePattern = /(\d{2})\.(\d{2})\.(\d{2,4})/g;
  let lastDate = null;
  let match;
  while ((match = datePattern.exec(rollStr)) !== null) {
    const day = match[1], month = match[2];
    let year = match[3];
    if (year.length === 2) year = "20" + year;
    const d = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
    if (!isNaN(d.getTime()) && (!lastDate || d > lastDate)) lastDate = d;
  }
  return lastDate;
}

function formatDate(d) {
  if (!d) return null;
  return String(d.getDate()).padStart(2, "0") + "/" +
         String(d.getMonth() + 1).padStart(2, "0") + "/" +
         d.getFullYear();
}

function todayAsLogDate() {
  const today = new Date();
  return String(today.getDate()).padStart(2, "0") + "." +
         String(today.getMonth() + 1).padStart(2, "0") + "." +
         String(today.getFullYear()).slice(2);
}

                <td style={{ padding: "8px 10px", borderBottom: "1px solid #18181b", color: "#71717a", fontSize: 11, maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.notes}</td>
                <td style={{ padding: "8px 10px", borderBottom: "1px solid #18181b", color: "#52525b", fontSize: 11, fontFamily: "'JetBrains Mono', monospace", whiteSpace: "nowrap" }}>{item.mixDate}</td>
                <td style={{ padding: "8px 10px", borderBottom: "1px solid #18181b", minWidth: 130 }}>
                  <ProgressBar used={used} max={max} accent={colors.accent} />
                </td>
                <td style={{ padding: "8px 10px", borderBottom: "1px solid #18181b" }}>
                  <Badge color={isFresh ? "#22c55e" : "#71717a"} bg={isFresh ? "#052e16" : "#27272a"}>
                    {isFresh ? "ACTIVE" : "DISCARDED"}
                  </Badge>
                </td>
                <td style={{ padding: "8px 10px", borderBottom: "1px solid #18181b", textAlign: "center" }} onClick={e => e.stopPropagation()}>
                  <div style={{ display: "flex", gap: 4, justifyContent: "center" }}>
                    <button onClick={() => onLogRolls(item)} title="Log Rolls" style={{
                      padding: "3px 8px", borderRadius: 4, border: "1px solid " + colors.badge,
                      background: "transparent", color: colors.accent, fontSize: 10, fontWeight: 700,
                      cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
                    }}>LOG</button>
                    <button onDoubleClick={e => e.stopPropagation()} onClick={() => onDelete(item.id)} title="Delete" style={{
                      background: "transparent", border: "1px solid #7f1d1d", color: "#f87171",
                      borderRadius: 4, cursor: "pointer", fontSize: 12, width: 24, height: 24,
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      fontFamily: "'JetBrains Mono', monospace",
                    }}>×</button>
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function StatsView({ data }) {
  const rollsByKit = {};
  ["C41", "ECN-2", "E6", "B&W"].forEach(k => { rollsByKit[k] = 0; });
  data.forEach(d => { rollsByKit[d.kit] = (rollsByKit[d.kit] || 0) + parseRollCount(d.rolls); });
  const maxKit = Math.max(...Object.values(rollsByKit), 1);

  const rollsByChem = {};
  data.forEach(d => { rollsByChem[d.chem] = (rollsByChem[d.chem] || 0) + parseRollCount(d.rolls); });
  const topChems = Object.entries(rollsByChem).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const maxChem = topChems.length > 0 ? topChems[0][1] : 1;

  const batchesByKit = {};
  ["C41", "ECN-2", "E6", "B&W"].forEach(k => { batchesByKit[k] = 0; });
  data.forEach(d => { batchesByKit[d.kit] = (batchesByKit[d.kit] || 0) + 1; });

  const sectionTitle = { color: "#fafafa", fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16, fontFamily: "'JetBrains Mono', monospace" };

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16 }}>
        <div style={{ background: "#18181b", borderRadius: 12, padding: "18px 20px", border: "1px solid #27272a" }}>
          <div style={sectionTitle}>Rolls by Kit</div>
          {["C41", "ECN-2", "E6", "B&W"].map(kit => (
            <HorizontalBar key={kit} label={kit} value={rollsByKit[kit]} maxValue={maxKit} color={KIT_COLORS[kit].accent} labelColor={KIT_COLORS[kit].accent} />
          ))}
        </div>
        <div style={{ background: "#18181b", borderRadius: 12, padding: "18px 20px", border: "1px solid #27272a" }}>
          <div style={sectionTitle}>Top Chemicals</div>
          {topChems.map(([chem, count]) => (
            <HorizontalBar key={chem} label={chem} value={count} maxValue={maxChem} color="#818cf8" />
          ))}
        </div>
      </div>

      <div style={{ marginTop: 16, background: "#18181b", borderRadius: 12, padding: "18px 20px", border: "1px solid #27272a" }}>
        <div style={sectionTitle}>Batches by Kit</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12 }}>
          {["C41", "ECN-2", "E6", "B&W"].map(kit => {
            const colors = KIT_COLORS[kit];
            return (
              <div key={kit} style={{ background: colors.bg, borderRadius: 8, padding: "14px 16px", border: "1px solid " + colors.badge }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: colors.accent, fontFamily: "'JetBrains Mono', monospace" }}>{batchesByKit[kit]}</div>
                <div style={{ fontSize: 10, color: colors.text, textTransform: "uppercase", letterSpacing: "0.1em", marginTop: 3 }}>{kit}</div>
                <div style={{ fontSize: 10, color: "#52525b", marginTop: 2 }}>{rollsByKit[kit]} rolls</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ActiveView({ data, onLogRolls, onDiscard, onReactivate, onEdit, onDelete }) {
  const [filterKit, setFilterKit] = useState("All");
  const activeBatches = data.filter(d => d.status === "Fresh");
  const filtered = filterKit === "All" ? activeBatches : activeBatches.filter(d => d.kit === filterKit);

  return (
    <div>
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 14 }}>
        {["All", "C41", "ECN-2", "E6", "B&W"].map(k => (
          <button key={k} onClick={() => setFilterKit(k)} style={pillStyle(filterKit === k)}>{k}</button>
        ))}
      </div>
      <div style={{ fontSize: 11, color: "#52525b", marginBottom: 14, fontFamily: "'JetBrains Mono', monospace" }}>
        {filtered.length} active batch{filtered.length !== 1 ? "es" : ""}
      </div>
      {filtered.length === 0 ? (
        <div style={{ textAlign: "center", padding: 60, color: "#3f3f46" }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>~</div>
          <div style={{ fontSize: 13 }}>No active batches</div>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
          {filtered.map(item => {
            const colors = KIT_COLORS[item.kit] || KIT_COLORS["B&W"];
            return (
              <ChemCard
                key={item.id} item={item} colors={colors}
                onLogRolls={() => onLogRolls(item)}
                onDiscard={() => onDiscard(item.id)}
                onReactivate={() => onReactivate(item.id)}
                onEdit={() => onEdit(item)}
                onDelete={() => onDelete(item.id)}
              />
            );
          })}
        </div>
      )}
    </div>
  );
}

function AllBatchesView({ data, onEdit, onDelete, onLogRolls, onDiscard, onReactivate }) {
  const [search, setSearch] = useState("");
  const [filterKit, setFilterKit] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [sortBy, setSortBy] = useState("date_desc");

  let filtered = data.filter(d => {
    if (filterKit !== "All" && d.kit !== filterKit) return false;
    if (filterStatus !== "All" && d.status !== filterStatus) return false;
    if (search) {
      const q = search.toLowerCase();
      return (d.chem + d.notes + d.kit + d.rolls + d.extra).toLowerCase().includes(q);
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (sortBy === "date_desc") return parseDateForSort(b.mixDate) - parseDateForSort(a.mixDate);
    if (sortBy === "date_asc") return parseDateForSort(a.mixDate) - parseDateForSort(b.mixDate);
    if (sortBy === "kit") return a.kit.localeCompare(b.kit);
    return 0;
  });

  return (
    <div>
      <input
        placeholder="Search chemistry, brand, notes..."
        value={search}
        onChange={e => setSearch(e.target.value)}
        style={{
          width: "100%", padding: "10px 14px", borderRadius: 10, border: "1px solid #27272a",
          background: "#18181b", color: "#fafafa", fontSize: 13, outline: "none", marginBottom: 12,
          boxSizing: "border-box", fontFamily: "'JetBrains Mono', monospace",
        }}
      />
      <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap", alignItems: "center" }}>
        {["All", "C41", "ECN-2", "E6", "B&W"].map(k => (
          <button key={k} onClick={() => setFilterKit(k)} style={pillStyle(filterKit === k)}>{k}</button>
        ))}
        <div style={{ width: 1, height: 20, background: "#27272a", margin: "0 2px" }} />
        {[["All", "All"], ["Fresh", "Active"], ["Discarded", "Discarded"]].map(([val, label]) => (
          <button key={val} onClick={() => setFilterStatus(val)} style={pillStyle(filterStatus === val)}>{label}</button>
        ))}
        <div style={{ marginLeft: "auto" }}>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
            background: "#27272a", color: "#a1a1aa", border: "none", borderRadius: 8,
            padding: "5px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
          }}>
            <option value="date_desc">Newest first</option>
            <option value="date_asc">Oldest first</option>
            <option value="kit">By kit</option>
          </select>
        </div>
      </div>
      <div style={{ fontSize: 11, color: "#52525b", marginBottom: 10, fontFamily: "'JetBrains Mono', monospace" }}>
        {filtered.length} batch{filtered.length !== 1 ? "es" : ""} — double-click row to edit
      </div>
      {filtered.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: "#3f3f46" }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>~</div>
          <div style={{ fontSize: 13 }}>No batches match your filters</div>
        </div>
      ) : (
        <AllBatchesTable data={filtered} onEdit={onEdit} onDelete={onDelete} onLogRolls={onLogRolls} />
      )}
    </div>
  );
}

function App() {
  const [data, setData] = useState(INITIAL_DATA);
  const [tab, setTab] = useState("active");
  const [showAdd, setShowAdd] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [showLogRolls, setShowLogRolls] = useState(false);
  const [logRollsItem, setLogRollsItem] = useState(null);

  useEffect(() => {
    try {
      const stored = localStorage.getItem("chem-tracker-data");
      if (stored) setData(JSON.parse(stored));
    } catch (e) {
      console.error("Failed to load data:", e);
    }
  }, []);

  const save = useCallback((newData) => {
    setData(newData);
    try {
      localStorage.setItem("chem-tracker-data", JSON.stringify(newData));
    } catch (e) {
      console.error("Failed to save data:", e);
    }
  }, []);

  const handleAdd = batch => save([...data, batch]);
  const handleEdit = updated => save(data.map(d => d.id === updated.id ? updated : d));
  const handleDelete = id => {
    if (window.confirm("Delete this batch? This cannot be undone.")) {
      save(data.filter(d => d.id !== id));
    }
  };
  const handleStatusToggle = id => save(data.map(d => d.id === id ? { ...d, status: d.status === "Fresh" ? "Discarded" : "Fresh" } : d));
  const handleOpenEdit = item => { setEditItem(item); setShowEdit(true); };
  const handleOpenLogRolls = item => { setLogRollsItem(item); setShowLogRolls(true); };

  const exportCSV = () => {
    const headers = ["ID", "Kit", "Chemistry", "Mix Date", "Max Rolls", "Brand/Notes", "Roll Log", "Additional Notes", "Status"];
    const rows = data.map(d => [d.id, d.kit, d.chem, d.mixDate, d.maxRolls, d.notes, d.rolls, d.extra, d.status]);
    const csv = [headers, ...rows].map(r => r.map(v => '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"').join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "chemistry-tracker.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  const freshCount = data.filter(d => d.status === "Fresh").length;
  const archivedCount = data.filter(d => d.status !== "Fresh").length;
  const totalRolls = data.reduce((sum, d) => sum + parseRollCount(d.rolls), 0);

  const tabBtnStyle = (id) => ({
    padding: "10px 18px", border: "none", cursor: "pointer",
    fontSize: 11, fontWeight: 700, letterSpacing: "0.1em",
    fontFamily: "'JetBrains Mono', monospace",
    background: "transparent",
    color: tab === id ? "#fafafa" : "#52525b",
    borderBottom: "2px solid " + (tab === id ? "#fafafa" : "transparent"),
    transition: "all 0.15s ease",
    whiteSpace: "nowrap",
  });

  return (
    <div style={{ minHeight: "100vh", background: "#09090b", color: "#fafafa", fontFamily: "'Space Mono', 'JetBrains Mono', monospace" }}>
      <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

      {/* ── Header ── */}
      <header className="app-header">
        <div>
          <div style={{ fontSize: 10, color: "#52525b", fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase" }}>ETERNUS FILM</div>
          <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700, letterSpacing: "-0.01em" }}>Chemistry Tracker</h1>
        </div>
        <div className="header-buttons">
          <button onClick={exportCSV} style={{
            padding: "8px 14px", borderRadius: 8, border: "1px solid #27272a",
            background: "#18181b", color: "#a1a1aa", fontSize: 11, cursor: "pointer",
            fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, letterSpacing: "0.06em",
          }}>EXPORT CSV</button>
          <button onClick={() => setShowAdd(true)} style={{
            padding: "8px 14px", borderRadius: 8, border: "none",
            background: "#fafafa", color: "#09090b", fontSize: 11, cursor: "pointer",
            fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, letterSpacing: "0.06em",
          }}>+ NEW BATCH</button>
        </div>
      </header>

      <div className="main-container">

        {/* ── Stats Cards ── */}
        <div className="stats-grid">
          <StatCard value={freshCount}   label="Active"      valueColor="#4ade80" bg="#052e16" />
          <StatCard value={archivedCount} label="Archived"   valueColor="#71717a" bg="#18181b" />
          <StatCard value={data.length}  label="Batches"     valueColor="#fafafa" bg="#18181b" />
          <StatCard value={totalRolls}   label="Rolls Total" valueColor="#fafafa" bg="#18181b" />
        </div>

        {/* ── Tabs ── */}
        <div style={{ display: "flex", borderBottom: "1px solid #27272a", marginBottom: 20 }}>
          <button style={tabBtnStyle("active")} onClick={() => setTab("active")}>ACTIVE</button>
          <button style={tabBtnStyle("all")} onClick={() => setTab("all")}>ALL BATCHES</button>
          <button style={tabBtnStyle("stats")} onClick={() => setTab("stats")}>STATS</button>
        </div>

        {/* ── Tab Content ── */}
        {tab === "active" && (
          <ActiveView
            data={data}
            onLogRolls={handleOpenLogRolls}
            onDiscard={handleStatusToggle}
            onReactivate={handleStatusToggle}
            onEdit={handleOpenEdit}
            onDelete={handleDelete}
          />
        )}
        {tab === "all" && (
          <AllBatchesView
            data={data}
            onEdit={handleOpenEdit}
            onDelete={handleDelete}
            onLogRolls={handleOpenLogRolls}
            onDiscard={handleStatusToggle}
            onReactivate={handleStatusToggle}
          />
        )}
        {tab === "stats" && <StatsView data={data} />}
      </div>

      {showAdd && (
        <AddBatchModal
          onClose={() => setShowAdd(false)}
          onAdd={handleAdd}
          nextId={Math.max(...data.map(d => d.id), 0) + 1}
        />
      )}
      {showEdit && editItem && (
        <EditBatchModal
          item={editItem}
          onClose={() => { setShowEdit(false); setEditItem(null); }}
          onSave={handleEdit}
        />
      )}
      {showLogRolls && logRollsItem && (
        <LogRollsModal
          item={logRollsItem}
          onClose={() => { setShowLogRolls(false); setLogRollsItem(null); }}
          onSave={handleEdit}
        />
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));

</script>

</body>
</html>
